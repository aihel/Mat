<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LukarixMat sorular (42 syf</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
body { text-align:center; font-family:Arial; background:#f0f0f0; }
#pdf { border:1px solid #ccc; margin-top:20px; }
button { margin: 2px; padding:5px 10px; cursor:pointer; }
</style>
</head>

<body>

<h2>PDF Giriş</h2>
<input type="password" id="sifre" placeholder="Şifre gir">
<button onclick="kontrol()">Giriş</button>

<br><br>

<div id="viewer" style="display:none;">
    <div>
        <button onclick="prevPage()">◀</button>
        <span id="pageInfo">1 / 1</span>
        <button onclick="nextPage()">▶</button>

        <button onclick="zoomOut()">-</button>
        <button onclick="zoomIn()">+</button>
    </div>
    <canvas id="pdf"></canvas>
</div>

<script>
const PASSWORD = "Lukarixyz";

let pdfDoc = null,
    pageNum = 1,
    scale = 1.5,
    canvas = document.getElementById('pdf'),
    ctx = canvas.getContext('2d');

function kontrol(){
    let input = document.getElementById("sifre").value;
    if(input === PASSWORD){
        document.getElementById('viewer').style.display = "block";
        loadPDF();
    } else {
        alert("Yanlış şifre!");
        document.getElementById("sifre").value = "";
    }
}

function loadPDF(){
    pdfjsLib.getDocument("pdf.pdf").promise.then(pdf => {
        pdfDoc = pdf;
        renderPage(pageNum);
    });
}

function renderPage(num){
    pdfDoc.getPage(num).then(page => {
        const viewport = page.getViewport({scale: scale});
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        page.render({canvasContext: ctx, viewport: viewport});
        document.getElementById("pageInfo").innerText = num + " / " + pdfDoc.numPages;
    });
}

function nextPage(){
    if(pageNum < pdfDoc.numPages){
        pageNum++;
        renderPage(pageNum);
    }
}

function prevPage(){
    if(pageNum > 1){
        pageNum--;
        renderPage(pageNum);
    }
}

function zoomIn(){
    scale += 0.2;
    renderPage(pageNum);
}

function zoomOut(){
    if(scale > 0.5){
        scale -= 0.2;
        renderPage(pageNum);
    }
}
</script>

</body>
</html>
