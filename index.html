<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>LukarixYZ (Dızladıgım pdf)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#0f2027,#2c5364);
    color:white;
    text-align:center;
}

/* LOGIN */
#login {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:15px;
    backdrop-filter: blur(10px);
}

input {
    padding:10px;
    border-radius:10px;
    border:none;
}

button {
    padding:10px 20px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:cyan;
    cursor:pointer;
}

/* VIEWER */
#viewer {
    display:none;
    padding-top:10px;
}

#pdfContainer {
    width: 90vw;   /* Ekran genişliğinin %90'ı */
    margin: 20px auto;
}

canvas {
    width: 100% !important; /* Canvas ekran genişliğine uyumlu */
    height: auto !important;
    box-shadow:0 0 15px black;
}

/* TOOLBAR */
.toolbar {
    margin-top:10px;
    margin-bottom:10px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h2>🔐 Giriş yap buba</h2>
    <input type="password" id="pass" placeholder="Şifre"><br>
    <button onclick="login()">Giriş</button>
    <p id="err" style="color:red;"></p>
</div>

<!-- VIEWER -->
<div id="viewer">
    <div class="toolbar">
        <button onclick="prevPage()">⬅ Önceki</button>
        <span id="pageInfo"></span>
        <button onclick="nextPage()">➡ Sonraki</button>
        <button onclick="zoomIn()">🔍+</button>
        <button onclick="zoomOut()">🔍-</button>
    </div>
    <div id="pdfContainer"></div>
</div>

<script>
let pdfDoc=null;
let pageNum=1;
let scale=1.5;

function login(){
    if(document.getElementById("pass").value==="LukarixYZ"){
        document.getElementById("login").style.display="none";
        document.getElementById("viewer").style.display="block";
        openPDF('pdf.pdf'); // Dosya adı
    } else {
        document.getElementById("err").innerText="Yanlış şifre!";
    }
}

function openPDF(file){
    pageNum=1;
    pdfjsLib.getDocument(file).promise.then(pdf=>{
        pdfDoc=pdf;
        renderPage(pageNum);
    });
}

function renderPage(num){
    pdfDoc.getPage(num).then(page=>{
        const canvas=document.createElement("canvas");
        const ctx=canvas.getContext("2d");
        const viewport=page.getViewport({scale:scale});
        canvas.height=viewport.height;
        canvas.width=viewport.width;

        const container=document.getElementById("pdfContainer");
        container.innerHTML="";
        container.appendChild(canvas);

        page.render({canvasContext:ctx,viewport:viewport});
        document.getElementById("pageInfo").innerText=num+" / "+pdfDoc.numPages;
    });
}

function nextPage(){ if(pageNum < pdfDoc.numPages){ pageNum++; renderPage(pageNum); } }
function prevPage(){ if(pageNum > 1){ pageNum--; renderPage(pageNum); } }
function zoomIn(){ scale+=0.2; renderPage(pageNum); }
function zoomOut(){ scale-=0.2; renderPage(pageNum); }
</script>

</body>
</html>
