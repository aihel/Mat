<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Lukarix olası sorular (dızladı</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

#login {
    margin-top: 100px;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

#viewer {
    display: none;
}

canvas {
    margin-top: 10px;
    border-radius: 10px;
}

.controls {
    margin-top: 10px;
}
</style>
</head>

<body oncontextmenu="return false">

<div id="login">
    <h2>PDF Giriş</h2>
    <input type="password" id="password" placeholder="Şifre gir">
    <button onclick="login()">Giriş Yap</button>
</div>

<div id="viewer">
    <h2>Lukarix PDF Sistem</h2>

    <div class="controls">
        <button onclick="prevPage()">◀</button>
        <span id="pageInfo"></span>
        <button onclick="nextPage()">▶</button>

        <button onclick="zoomOut()">-</button>
        <button onclick="zoomIn()">+</button>
    </div>

    <canvas id="pdf-render"></canvas>
</div>

<script>
const correctPassword = "Lukarixyz";

function login() {
    const input = document.getElementById("password").value;
    if (input === correctPassword) {
        document.getElementById("login").style.display = "none";
        document.getElementById("viewer").style.display = "block";
        loadPDF();
    } else {
        alert("Yanlış şifre!");
    }
}

// PDF AYARLARI
let pdfDoc = null,
    pageNum = 1,
    scale = 1.5,
    canvas = document.getElementById('pdf-render'),
    ctx = canvas.getContext('2d');

function loadPDF() {
    pdfjsLib.getDocument("LukarixSınavMatDızlamaKolej(1).pdf").promise.then(pdf => {
        pdfDoc = pdf;
        renderPage(pageNum);
    });
}

function renderPage(num) {
    pdfDoc.getPage(num).then(page => {
        const viewport = page.getViewport({ scale: scale });
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        page.render({
            canvasContext: ctx,
            viewport: viewport
        });

        document.getElementById("pageInfo").innerText = num + " / " + pdfDoc.numPages;
    });
}

function nextPage() {
    if (pageNum < pdfDoc.numPages) {
        pageNum++;
        renderPage(pageNum);
    }
}

function prevPage() {
    if (pageNum > 1) {
        pageNum--;
        renderPage(pageNum);
    }
}

function zoomIn() {
    scale += 0.2;
    renderPage(pageNum);
}

function zoomOut() {
    if (scale > 0.5) {
        scale -= 0.2;
        renderPage(pageNum);
    }
}
</script>

</body>
</html>
